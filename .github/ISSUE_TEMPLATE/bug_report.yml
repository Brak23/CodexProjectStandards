name: Bug report
description: Report reproducible incorrect behavior
title: "fix: "
labels: [bug, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or system behavior is wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reliable reproduction.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and evidence
      description: Include logs with secrets and sensitive data removed.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, commit, runtime, browser, operating system, and deployment target.
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options: [Low, Moderate, High, Critical]
    validations:
      required: true
