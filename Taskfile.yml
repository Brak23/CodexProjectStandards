version: '3'

silent: true

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  bootstrap:
    desc: Interactively configure a repository created from this template
    cmds:
      - python3 scripts/bootstrap_project.py
      - python3 scripts/configure_review_governance.py
      - python3 scripts/bootstrap_next_steps.py

  bootstrap-config:
    desc: Configure the repository from project.yml
    preconditions:
      - sh: test -f project.yml
        msg: Copy project.config.example.yml to project.yml and edit it first.
    cmds:
      - python3 scripts/bootstrap_project.py --config project.yml
      - python3 scripts/configure_review_governance.py
      - python3 scripts/bootstrap_next_steps.py

  doctor:
    desc: Report standards adoption health and the highest-priority gaps
    cmds:
      - python3 scripts/doctor.py

  recommend:
    desc: Recommend the Light, Full Feature, or High-Risk workflow
    cmds:
      - python3 scripts/recommend_workflow.py

  agent-evals:
    desc: Validate the portable agent behavior evaluation contracts
    cmds:
      - python3 scripts/validate_agent_governance.py --evals-only

  review-store-init:
    desc: Configure Git to fetch the durable refs/reviews namespace
    cmds:
      - python3 .agents/skills/code-review/scripts/review_store.py init

  review-contracts:
    desc: Validate the project-local code-review skill contracts
    cmds:
      - python3 .agents/skills/code-review/scripts/validate_review_artifacts.py --contracts-only

  review-tests:
    desc: Run dependency-free tests for review storage, reconciliation, aggregation, and gating
    cmds:
      - python3 scripts/test_code_review_skill.py

  plan-init:
    desc: Initialize a model-v2 planning workspace
    requires:
      vars: [WORK]
    cmds:
      - python3 .agents/skills/feature-execution-planner/scripts/init_planning_workspace.py --work "{{.WORK}}"

  plan-context:
    desc: Refresh deterministic repository context for a planning workspace
    requires:
      vars: [WORK]
    cmds:
      - python3 .agents/skills/feature-execution-planner/scripts/collect_planning_context.py --work "{{.WORK}}"

  plan-render:
    desc: Regenerate decisions, plan, task graph, and release graph views
    requires:
      vars: [WORK]
    cmds:
      - python3 .agents/skills/feature-execution-planner/scripts/render_planning_views.py --work "{{.WORK}}" --write

  plan-check:
    desc: Validate a model-v2 feature planning workspace
    requires:
      vars: [WORK]
    cmds:
      - python3 .agents/skills/feature-execution-planner/scripts/validate_planning_artifacts.py --work "{{.WORK}}"

  plan-impact:
    desc: Compute and write a planning impact closure
    requires:
      vars: [WORK]
    cmds:
      - python3 .agents/skills/feature-execution-planner/scripts/assess_plan_impact.py --work "{{.WORK}}" --write

  plan-build:
    desc: Build a plan manifest from current normative records
    requires:
      vars: [WORK, REVISION, RISK, SIZE]
    cmds:
      - python3 .agents/skills/feature-execution-planner/scripts/build_plan_manifest.py --work "{{.WORK}}" --revision "{{.REVISION}}" --risk "{{.RISK}}" --size "{{.SIZE}}"

  plan-auth-check:
    desc: Validate planning contracts including implementation authorization
    requires:
      vars: [WORK]
    cmds:
      - python3 .agents/skills/feature-execution-planner/scripts/validate_planning_artifacts.py --work "{{.WORK}}"

  plan-migrate:
    desc: Preserve a legacy workspace and initialize draft model-v2 records
    requires:
      vars: [WORK]
    cmds:
      - python3 .agents/skills/feature-execution-planner/scripts/migrate_legacy_workspace.py --work "{{.WORK}}"

  plan-evals:
    desc: Run dependency-free Feature Execution Planner tests and evaluation contracts
    cmds:
      - python3 scripts/test_feature_planner_skill.py
      - python3 scripts/validate_agent_governance.py --evals-only

  validate:
    desc: Validate required structure, local links, workflows, configuration, and agent governance
    cmds:
      - python3 scripts/validate_repository.py
      - python3 scripts/validate_agent_governance.py
      - python3 .agents/skills/code-review/scripts/validate_review_artifacts.py --contracts-only
      - python3 .agents/skills/feature-execution-planner/scripts/validate_planning_artifacts.py --contracts-only

  verify:
    desc: Run the authoritative stack-agnostic verification contract
    cmds:
      - python3 scripts/verify_project.py

  feature:
    desc: Create a model-v2 feature workspace from the standard templates
    requires:
      vars: [FEATURE, NAME]
    cmds:
      - python3 scripts/create_feature.py --feature "{{.FEATURE}}" --name "{{.NAME}}"

  archive-feature:
    desc: Archive a completed feature workspace
    requires:
      vars: [WORK]
    cmds:
      - python3 scripts/archive_feature.py --work "{{.WORK}}"

  example-test:
    desc: Run the dependency-free reference application tests when present
    cmds:
      - |
        if [ -f examples/reference-project/package.json ]; then
          cd examples/reference-project && node --test
        else
          echo "Reference project is not present."
        fi
