name: Planning authority

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-authority:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out trusted base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755
        with:
          python-version: '3.13'

      - name: Validate current-head authenticated approvals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python3 .agents/skills/feature-execution-planner/scripts/validate_planning_authority.py
