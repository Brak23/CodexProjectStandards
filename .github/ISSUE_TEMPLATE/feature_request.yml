name: Feature request
description: Propose a user or operational outcome
title: "feat: "
labels: [feature, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the problem without prescribing implementation.
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: Users and context
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired observable outcome
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples and edge cases
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Include security, data, compliance, cost, timeline, compatibility, or platform constraints.
